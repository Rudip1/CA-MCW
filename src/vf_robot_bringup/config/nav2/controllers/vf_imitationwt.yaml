# =============================================================================
# vf_robot_bringup / config / nav2 / controllers / vf_imitationwt.yaml
# =============================================================================
# VF Robot Controller — IMITATION-WEIGHTS mode.
# Plugin maps "imitationwt" → VFMode::PASSIVE: returns zero twist on every
# call. Lets Nav2's BT load a controller while the Python imitation sidecar
# owns /cmd_vel directly. MPPI optimizer is NOT instantiated; no optimizer or
# critic params needed.
# Merge fragment for nav2_base.yaml.
# =============================================================================

controller_server:
  ros__parameters:
    FollowPath:
      plugin: "vf_robot_controller::VFController"
      controller_mode: "imitationwt"
