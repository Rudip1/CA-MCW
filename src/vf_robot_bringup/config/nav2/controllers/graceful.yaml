# =============================================================================
# vf_robot_bringup / config / nav2 / controllers / graceful.yaml
# =============================================================================
# Stock Nav2 Graceful Motion Controller — smooth trajectory baseline
#
# The Graceful controller uses a feedback control law (ego-polar coordinates)
# to generate smooth, continuous curvature trajectories toward a moving target
# point on the global path. Unlike RPP (which steps from carrot to carrot),
# Graceful produces C1-continuous velocity profiles that avoid abrupt heading
# changes — making it well-suited to smooth final approaches.
#
# WHY THIS IS A USEFUL BASELINE:
#   Graceful's smooth control law is sometimes compared favorably to MPPI
#   in final-approach scenarios (docking, precise goal reaching). Adding it
#   completes the set of all stock Nav2 controller plugins for ablation.
#
# GRACEFUL KEY PARAMETERS:
#   k_phi, k_delta  — angular feedback and heading correction gains
#   beta, lambda    — curvature smoothness and growth rate
#   v_linear_max    — peak forward speed (overridden by robot profile)
#   v_angular_max   — peak angular speed (overridden by robot profile)
#   slowdown_radius — begin slowing when within this radius of goal
#   initial_rotation — spin to align heading before driving
#   final_rotation   — spin to match goal yaw on arrival
#
# MERGE CONTRACT:
#   Fragment. Merged with nav2_base.yaml by compose_params.py.
#   Provides ONLY the FollowPath: block.
#
# PARAMETER SOURCE OF TRUTH:
#   nav2_graceful_controller documentation and the canonical Nav2 defaults.
#   Velocity-related params are overridden by the robot profile via the
#   "graceful" controller_overrides block.
# =============================================================================

controller_server:
  ros__parameters:
    FollowPath:
      plugin: "nav2_graceful_controller::GracefulController"

      # ── Target point on path ───────────────────────────────────────────────
      motion_target_dist: 0.6
      max_robot_pose_search_dist: 10.0

      # ── Feedback gains (ego-polar control law) ─────────────────────────────
      # k_phi:   angular error gain (drives heading toward target)
      # k_delta: curvature correction gain (reduces cross-track error)
      # beta, lambda: curvature profile shape (Nav2 reference defaults)
      k_phi: 3.0
      k_delta: 2.0
      beta: 0.4
      lambda: 2.0

      # ── Velocity limits (overridden by robot profile) ──────────────────────
      v_linear_min: 0.05
      v_linear_max: 0.5
      v_angular_max: 1.0

      # ── Goal approach ──────────────────────────────────────────────────────
      slowdown_radius: 1.5          # start slowing this far from goal

      # ── Heading alignment ──────────────────────────────────────────────────
      initial_rotation: true        # spin to align before driving
      initial_rotation_min_angle: 0.75  # rad — spin if >~43° off-heading
      final_rotation: true          # spin to match goal yaw on arrival
      prefer_final_rotation: false

      # ── Misc ──────────────────────────────────────────────────────────────
      transform_tolerance: 0.1
