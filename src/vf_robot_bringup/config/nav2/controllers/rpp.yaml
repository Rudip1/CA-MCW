# =============================================================================
# vf_robot_bringup / config / nav2 / controllers / rpp.yaml
# =============================================================================
# Stock Nav2 Regulated Pure Pursuit (RPP) Controller — geometric baseline
#
# RPP follows the global path by computing a lookahead "carrot" point and
# commanding the robot toward it. It uses heuristic velocity regulation
# (curvature-scaling and cost-scaling) to slow in tight turns and near
# obstacles, while still being a purely geometric path tracker.
#
# WHY THIS IS A USEFUL BASELINE:
#   RPP is deterministic and purely geometric — it has no sampling, no cost
#   function weighting, and no neural components. Comparing the VF Robot
#   Controller (an MPPI variant) against RPP demonstrates the advantage of
#   trajectory optimization over simple pure-pursuit geometry.
#
# RPP KEY PARAMETERS:
#   lookahead_dist / lookahead_time   — distance (or time × velocity) to the
#                                        carrot point; larger = smoother but
#                                        may cut corners
#   use_velocity_scaled_lookahead_dist — scale lookahead by current speed
#   use_regulated_linear_velocity_scaling — slow on high curvature
#   use_cost_regulated_linear_velocity_scaling — slow near high-cost cells
#   use_rotate_to_heading — spin in place to align before driving forward
#
# MERGE CONTRACT:
#   Fragment. Merged with nav2_base.yaml by compose_params.py.
#   Provides ONLY the FollowPath: block.
#
# PARAMETER SOURCE OF TRUTH:
#   nav2_regulated_pure_pursuit_controller documentation and the canonical
#   Nav2 nav2_params.yaml defaults. Velocity-related params are overridden
#   by the robot profile via the "rpp" controller_overrides block.
# =============================================================================

controller_server:
  ros__parameters:
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ── Lookahead ──────────────────────────────────────────────────────────
      desired_linear_vel: 0.5               # overridden by robot profile
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false

      # ── Approach to goal ───────────────────────────────────────────────────
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 1.0

      # ── Collision detection ────────────────────────────────────────────────
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      # ── Curvature-based velocity regulation ───────────────────────────────
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25

      # ── Cost-based velocity regulation ────────────────────────────────────
      use_cost_regulated_linear_velocity_scaling: false

      # ── Rotate to heading before driving ──────────────────────────────────
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 1.8    # overridden by robot profile
      rotate_to_heading_min_angle: 0.785    # 45 deg — spin if >45° off-heading
      max_angular_accel: 3.2               # overridden by robot profile
      allow_reversing: false

      # ── Misc ──────────────────────────────────────────────────────────────
      transform_tolerance: 0.1
      max_robot_pose_search_dist: 10.0
      use_interpolation: false
