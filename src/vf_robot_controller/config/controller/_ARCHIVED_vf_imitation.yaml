# =============================================================================
# vf_robot_bringup / config / nav2 / controllers / vf_imitation.yaml
# =============================================================================
# VF Robot Controller - IMITATION mode (Phase 8 behavior-cloning baseline).
# The MPPI optimizer is bypassed entirely. /cmd_vel comes from a Python
# inference sidecar (imitation_inference_node.py) that reads /vf/features
# and publishes a Twist on /vf_controller/imitation_cmd_vel. The C++ plugin
# subscribes, caches with a staleness check, and emits zero twist if the
# sidecar drops out (velocity_smoother glides toward zero).
#
# This is design anti-pattern #7 (do NOT mix INFERENCE and IMITATION
# at runtime); it is intentionally a separate plugin path with its own
# provider class and its own .onnx.
# Merge fragment for nav2_base.yaml.
# =============================================================================

controller_server:
  ros__parameters:
    FollowPath:
      plugin: "vf_robot_controller::VFController"

      # ── VF mode + provider ──────────────────────────────────────────────────
      controller_mode: "imitation"
      weight_provider: "imitation_onnx"

      # ── Imitation sidecar parameters (Phase 8) ──────────────────────────────
      imitation_topic: "/vf_controller/imitation_cmd_vel"
      imitation_timeout_ms: 200

      # ── MPPI optimizer params (UNUSED in imitation mode but required by
      #    Nav2 param tree to avoid the controller_server choking). They mirror
      #    vf_fixed.yaml so a runtime mode flip wouldn't break anything.
      time_steps: 56
      model_dt: 0.05
      batch_size: 4000
      iteration_count: 1
      temperature: 0.3
      gamma: 0.015
      open_loop: false
      motion_model: "DiffDrive"
      retry_attempt_limit: 1

      vx_max: 0.30
      vx_min: -0.20
      vy_max: 0.0
      wz_max: 1.0
      ax_max: 0.4
      ax_min: -0.4
      ay_max: 0.0
      ay_min: 0.0
      az_max: 1.2

      vx_std: 0.2
      vy_std: 0.0
      wz_std: 0.4

      gcf_radius: 2.0
      gcf_weight_2d: 0.5
      gcf_weight_clutter: 0.25
      gcf_weight_volumetric: 0.25
      gcf_clutter_radius: 0.8
      tight_gcf_threshold: 0.55
      use_3d_clearance: false

      robot_length: 0.281
      robot_width: 0.306
      robot_height_min: 0.05
      robot_height_max: 0.40
      safety_inflation: 0.07

      visualize: false
      publish_optimal_trajectory: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      # Empty critic list: IMITATION skips MPPI in computeVelocityCommands().
      critics: []
