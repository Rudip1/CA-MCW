# critics.yaml — full critic stack (11 upstream MPPI + 3 VF custom)
#
# Loaded by upstream nav2_mppi_controller's CriticManager.
# Per-critic weight applied dynamically via VFCriticManager (Phase 2+).
#
# Reynolds taxonomy mapping:
#   SEPARATION      : ObstaclesCritic, CostCritic, VolumetricCritic, DynamicObstacleCritic
#   ALIGNMENT       : PathAlignCritic, PathAngleCritic
#   COHESION        : PathFollowCritic, CorridorCritic
#   GOAL_SEEKING    : GoalCritic, GoalAngleCritic
#   SMOOTHNESS      : PreferForwardCritic, TwirlingCritic, VelocityDeadbandCritic, ConstraintCritic

controller_server:
  ros__parameters:
    FollowPath:
      critics:
        # Upstream MPPI critics (loaded from installed nav2_mppi_controller)
        - "ConstraintCritic"
        - "ObstaclesCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathAngleCritic"
        - "PathFollowCritic"
        - "PreferForwardCritic"
        - "TwirlingCritic"
        - "VelocityDeadbandCritic"
        # VF custom critics (loaded via plugins/critic_plugins.xml)
        - "CorridorCritic"
        - "VolumetricCritic"
        - "DynamicObstacleCritic"

      # Per-critic parameter blocks: TODO Phase 3, copy upstream defaults + tune
