# vf_controller_fixed_emphasis.yaml — Phase 2 sanity check.
#
# Skewed multipliers: heavy obstacle/cost emphasis, suppressed path-following.
# Robot should be visibly more conservative — slower in tight spaces, less
# willing to deviate from the planner path.
#
# Same critics as vf_controller_fixed.yaml in the same order. Copy any block
# from there to override per-critic baseline weights; this file overlays only
# the multiplier vector.

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "vf_robot_controller::VFController"

      controller_mode: "fixedwt"
      weight_provider: "fixed"
      # Order: Constraint, Cost, Goal, GoalAngle, PathAlign, PathFollow,
      #        PathAngle, PreferForward
      # Cost critic 5×, GoalAngle 3×; PathAlign and PathFollow suppressed.
      fixed_weights: [1.0, 5.0, 1.0, 3.0, 0.2, 0.2, 1.0, 1.0]

      # ── MPPI optimizer (same as vf_controller_fixed.yaml) ──────────────
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      iteration_count: 1
      temperature: 0.3
      gamma: 0.015

      motion_model: "DiffDrive"

      vx_max:  0.5
      vx_min: -0.35
      vy_max:  0.0
      wz_max:  1.9
      ax_max:  3.0
      ax_min: -3.0
      ay_max:  3.0
      ay_min: -3.0
      az_max:  3.5

      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4

      visualize: true
      regenerate_noises: true

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      AckermannConstraints:
        min_turning_r: 0.2

      critics:
        - "WeightedConstraintCritic"
        - "WeightedCostCritic"
        - "WeightedGoalCritic"
        - "WeightedGoalAngleCritic"
        - "WeightedPathAlignCritic"
        - "WeightedPathFollowCritic"
        - "WeightedPathAngleCritic"
        - "WeightedPreferForwardCritic"

      WeightedConstraintCritic: { enabled: true, cost_power: 1, cost_weight: 4.0 }
      WeightedGoalCritic:
        { enabled: true, cost_power: 1, cost_weight: 5.0, threshold_to_consider: 1.4 }
      WeightedGoalAngleCritic:
        { enabled: true, cost_power: 1, cost_weight: 3.0, threshold_to_consider: 0.5 }
      WeightedPreferForwardCritic:
        { enabled: true, cost_power: 1, cost_weight: 5.0, threshold_to_consider: 0.5 }
      WeightedCostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      WeightedPathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      WeightedPathFollowCritic:
        { enabled: true, cost_power: 1, cost_weight: 5.0, offset_from_furthest: 5, threshold_to_consider: 1.4 }
      WeightedPathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
